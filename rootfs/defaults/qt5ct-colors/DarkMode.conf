[ColorScheme]
# Dark Mode (monochrome IBM-Carbon greyscale, base #161616) in qt5ct format —
# NOT identical to the KDE .colors format! No colour accent: Highlight is grey
# (#525252), links are grey too. See the vault note "Style Guide - Docker
# Container". Replaces the previous qt5ct colours.
# Order of the 20 colours:
#  WindowText, Button, Light, Midlight, Dark, Mid, Text, BrightText,
#  ButtonText, Base, Window, Shadow, Highlight, HighlightedText, Link,
#  LinkVisited, AlternateBase, NoRole, ToolTipBase, ToolTipText
