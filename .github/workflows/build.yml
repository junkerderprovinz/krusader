name: Build & Push

# -----------------------------------------------------------------------------
# Builds the Krusader-on-KasmVNC image and pushes it to:
#   * GitHub Container Registry  (ghcr.io/junkerderprovinz/krusader)
#   * Docker Hub                 (docker.io/<DOCKERHUB_USERNAME>/krusader)
#     — active only once the DOCKERHUB_USERNAME variable and DOCKERHUB_TOKEN
#       secret are set together; until then the build stays GHCR-only.
#
# Triggers:
#   * Push to main           → tags: latest, sha-<short>
#   * Tag v*.*.*             → tags: latest, <version>, <major>, <major.minor>
#   * Weekly cron (Sun 04 UTC) – picks up upstream KasmVNC base updates
#   * Manual workflow_dispatch
# -----------------------------------------------------------------------------

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

env:
  IMAGE_NAME: krusader

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub mirror — active only once DOCKERHUB_USERNAME (variable) and
      # DOCKERHUB_TOKEN (secret) are set together. Until then this step is
      # skipped and the build stays GHCR-only, so CI is unaffected.
      - name: Login to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            name=docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }},enable=${{ vars.DOCKERHUB_USERNAME != '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=schedule,pattern=weekly
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # Smoke-test gate (amd64): build the image, boot it, and require the KasmVNC
      # WebUI to respond before anything is pushed. A green Docker build only proves
      # the image *builds* — this proves the container actually *starts* and serves
      # the WebUI (catches an s6 / KasmVNC / Krusader boot crash before :latest).
      # amd64-only on purpose: the KasmVNC desktop is too slow to boot reliably
      # under arm64 QEMU emulation for a CI gate.
      - name: Build amd64 image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: krusader:smoke-amd64
          cache-from: type=gha

      - name: Smoke test — amd64 must boot and serve the WebUI
        run: |
          set -euo pipefail
          name=kru-smoke
          docker run -d --name "$name" --platform linux/amd64 -p 3000:3000 -p 3001:3001 krusader:smoke-amd64
          up() {
            # KasmVNC serves HTTPS on 3001 (self-signed) and HTTP on 3000; any HTTP
            # status (even 401) means the WebUI server is up. 000 = not listening.
            local c
            c=$(curl -k -o /dev/null -s -w '%{http_code}' --max-time 5 https://localhost:3001/ || true)
            { [ -n "$c" ] && [ "$c" != "000" ]; } && return 0
            c=$(curl -o /dev/null -s -w '%{http_code}' --max-time 5 http://localhost:3000/ || true)
            { [ -n "$c" ] && [ "$c" != "000" ]; } && return 0
            return 1
          }
          for i in $(seq 1 150); do
            if up; then
              echo "✅ WebUI responded after ${i}s"
              docker rm -f "$name" >/dev/null
              exit 0
            fi
            if [ -z "$(docker ps -q --filter "name=$name")" ]; then
              echo "❌ container exited early — logs:"; docker logs "$name" || true
              docker rm -f "$name" >/dev/null; exit 1
            fi
            sleep 1
          done
          echo "❌ WebUI did not respond within 150s — logs:"
          docker logs "$name" || true
          docker rm -f "$name" >/dev/null
          exit 1

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          # KasmVNC baseimage publishes amd64 + arm64; we follow.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image digest = ${{ steps.meta.outputs.digest }}"
