name: build-and-publish

# -----------------------------------------------------------------------------
# Baut das Krusader-Unraid-Image und publiziert es nach
#   * GitHub Container Registry  (ghcr.io/<owner>/krusader-unraid)
#   * Docker Hub                 (<DOCKERHUB_USER>/krusader-unraid)  -- optional
#
# Trigger:
#   * Push auf main         → Tags: latest, sha-<short>
#   * Tag v*.*.*            → Tags: latest, <version>, <major>, <major.minor>
#   * Wöchentlicher Cron    → rebuild gegen frisches binhex/arch-krusader
#   * Manuell (workflow_dispatch)
# -----------------------------------------------------------------------------

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  schedule:
    # Jeden Sonntag um 04:00 UTC – holt neue binhex-Releases mit
    - cron: '0 4 * * 0'
  workflow_dispatch:

env:
  IMAGE_NAME: krusader-unraid

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKERHUB_USER && format('{0}/{1}', secrets.DOCKERHUB_USER, env.IMAGE_NAME) || '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=schedule,pattern=weekly
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # binhex/arch-krusader liefert nur amd64 + arm64 – wir folgen dem.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image digest = ${{ steps.meta.outputs.digest }}"
