name: Build & Push

# -----------------------------------------------------------------------------
# Builds the Krusader-on-KasmVNC image and pushes it to:
#   * GitHub Container Registry  (ghcr.io/junkerderprovinz/krusader)
#
# Triggers:
#   * Push to main           → tags: latest, sha-<short>
#   * Tag v*.*.*             → tags: latest, <version>, <major>, <major.minor>
#   * Weekly cron (Sun 04 UTC) – picks up upstream KasmVNC base updates
#   * Manual workflow_dispatch
# -----------------------------------------------------------------------------

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

env:
  IMAGE_NAME: krusader

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=schedule,pattern=weekly
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # KasmVNC baseimage publishes amd64 + arm64; we follow.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image digest = ${{ steps.meta.outputs.digest }}"
