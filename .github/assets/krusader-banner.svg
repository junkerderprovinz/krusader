<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1600 500" width="1600" height="500"
     role="img" aria-label="Krusader for Unraid – KasmVNC edition">

  <!-- ============================================================
       Krusader banner (dark mode)
       - Pure dark gradient background (Breeze Dark palette)
       - Original Krusader logo (KDE) front and centre
       - Subtle vignette + grid for depth, no extra UI clutter
       ============================================================ -->

  <defs>
    <!-- Background: deep Breeze-Dark vertical gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#0c1014"/>
      <stop offset="0.55" stop-color="#161b22"/>
      <stop offset="1"   stop-color="#0a0d11"/>
    </linearGradient>

    <!-- Soft radial vignette around the logo -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0"    stop-color="#1d99f3" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#1d99f3" stop-opacity="0.05"/>
      <stop offset="1"    stop-color="#1d99f3" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom accent stripe (Krusader/KDE blue) -->
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#1d99f3" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#1d99f3" stop-opacity="0.85"/>
      <stop offset="1"   stop-color="#1d99f3" stop-opacity="0"/>
    </linearGradient>

    <!-- Krusader logo (official KDE artwork, recoloured for dark mode) -->
    <linearGradient id="paneFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b323a"/>
      <stop offset="1" stop-color="#1f242a"/>
    </linearGradient>
    <linearGradient id="paneEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a434d"/>
      <stop offset="1" stop-color="#252a31"/>
    </linearGradient>

    <!-- Subtle background grid pattern -->
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1d99f3" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>

    <!-- Logo group: scalable Krusader icon, 320x320 viewport -->
    <symbol id="krusader-logo" viewBox="0 0 48 48">
      <!-- frame / shadow -->
      <rect x="3.5" y="3.5" width="41" height="41" rx="2" fill="#000" opacity="0.45"/>
      <!-- main body (window frame) -->
      <rect x="4" y="4" width="40" height="40" rx="1.5" fill="url(#paneEdge)"/>
      <!-- title bar -->
      <rect x="4" y="4" width="40" height="5" fill="#566069"/>
      <!-- title bar accent (Krusader blue underline) -->
      <rect x="4" y="9" width="40" height="1" fill="#1d99f3"/>
      <!-- close button -->
      <rect x="40" y="5" width="3" height="3" rx="1.5" fill="#eff0f1"/>
      <!-- left pane background -->
      <rect x="5" y="11" width="18" height="31" fill="url(#paneFill)"/>
      <!-- right pane background -->
      <rect x="25" y="11" width="18" height="31" fill="url(#paneFill)"/>
      <!-- left pane: 2 file rows (blue tab markers like the original) -->
      <g fill="#1d99f3">
        <path d="M6 12h2v1h2v3H6z"/>
        <path d="M6 20h2v1h2v3H6z"/>
      </g>
      <!-- right pane: 3 file rows -->
      <g fill="#1d99f3">
        <path d="M26 12h2v1h2v3h-4z"/>
        <path d="M26 20h2v1h2v3h-4z"/>
        <path d="M26 28h2v1h2v3h-4z"/>
      </g>
      <!-- subtle highlight on the panes -->
      <rect x="5"  y="11" width="18" height="0.6" fill="#1d99f3" opacity="0.35"/>
      <rect x="25" y="11" width="18" height="0.6" fill="#1d99f3" opacity="0.35"/>
    </symbol>
  </defs>

  <!-- Background layers -->
  <rect width="1600" height="500" fill="url(#bg)"/>
  <rect width="1600" height="500" fill="url(#grid)"/>
  <rect width="1600" height="500" fill="url(#vignette)"/>

  <!-- Faint corner glow -->
  <circle cx="800" cy="240" r="320" fill="#1d99f3" opacity="0.06"/>

  <!-- Logo, centred -->
  <g transform="translate(480 90)">
    <use href="#krusader-logo" width="320" height="320"/>
  </g>

  <!-- Wordmark right of the logo -->
  <g transform="translate(840 200)" fill="#eff0f1"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif">
    <text x="0" y="0" font-size="120" font-weight="700" letter-spacing="-2"
          fill="#ffffff">Krusader</text>
    <text x="0" y="58" font-size="34" font-weight="400" fill="#9aa4ad" letter-spacing="0.5">
      for Unraid · KasmVNC edition
    </text>
  </g>

  <!-- Bottom accent stripe -->
  <rect x="0" y="492" width="1600" height="4" fill="url(#stripe)"/>
</svg>
